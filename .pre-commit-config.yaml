repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude_types: [markdown]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      - id: go-imports-repo
        args:
          - "-local"
          - "github.com/beeper/ai-chats"
          - "-w"
      - id: go-mod-tidy

  - repo: local
    hooks:
      - id: go-vet-root
        name: go-vet-root
        language: system
        pass_filenames: false
        entry: bash -lc 'GOCACHE=/tmp/ai-chats-precommit-gocache go vet ./...'
      - id: go-staticcheck-root
        name: go-staticcheck-root
        language: system
        pass_filenames: false
        entry: bash -lc 'GOCACHE=/tmp/ai-chats-precommit-gocache staticcheck ./...'

  - repo: https://github.com/beeper/pre-commit-go
    rev: v0.4.2
    hooks:
      - id: zerolog-ban-msgf
      - id: zerolog-use-stringer
      - id: prevent-literal-http-methods
