instances:
  ai:
    bridge_type: ai
    mode: local-repo
    repo_path: .
    build_cmd: ./build.sh
    binary_path: ./ai
    beeper_bridge_name: sh-ai
    config_overrides:
      appservice.address: websocket
      appservice.hostname: 127.0.0.1
      appservice.port: 29345
      database.type: sqlite3-fk-wal
      database.uri: file:ai.db?_txlock=immediate
      bridge.permissions:
        "*": relay
        beeper.com: admin

  codex:
    bridge_type: codex
    mode: local-repo
    repo_path: .
    build_cmd: BINARY_NAME=codex ./tools/maubuild
    binary_path: ./codex
    beeper_bridge_name: sh-codex
    config_overrides:
      appservice.address: websocket
      appservice.hostname: 127.0.0.1
      appservice.port: 29346
      database.type: sqlite3-fk-wal
      database.uri: file:codex.db?_txlock=immediate
      bridge.permissions:
        "*": relay
        beeper.com: admin

  dummybridge:
    bridge_type: dummybridge
    mode: local-repo
    repo_path: .
    build_cmd: BINARY_NAME=dummybridge ./tools/maubuild
    binary_path: ./dummybridge
    beeper_bridge_name: sh-dummybridge
    config_overrides:
      appservice.address: websocket
      appservice.hostname: 127.0.0.1
      appservice.port: 29349
      database.type: sqlite3-fk-wal
      database.uri: file:dummybridge.db?_txlock=immediate
      bridge.permissions:
        "*": relay
        beeper.com: admin
